<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>分公司联系方式查询</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="page">
    <div class="panel">
      <div class="titleBox">分公司联系方式查询</div>

      <div class="form">
        <div class="field">
          <div class="label">省份</div>
          <div class="control">
            <input id="province" list="provinceList" placeholder="请输入或选择省份" autocomplete="off" />
            <datalist id="provinceList"></datalist>
          </div>
        </div>

        <div class="field">
          <div class="label">城市</div>
          <div class="control">
            <input id="city" list="cityList" placeholder="请输入或选择城市" autocomplete="off" />
            <datalist id="cityList"></datalist>
          </div>
        </div>

        <div class="actions">
          <button id="search" type="button">点击查询</button>
          <button id="reset" class="secondary" type="button">重置</button>
        </div>

        <div class="hint" id="count"></div>
      </div>

      <div id="results" class="results"></div>

      <div class="foot">数据以表格为准；如有变更请联系管理员更新。</div>
    </div>
  </main>

  <script src="./app.js"></script>
</body>
</html>
