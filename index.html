<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>联系方式查询</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>联系方式查询</h1>
      <p class="sub">选择省份/城市，或直接搜索关键词（省/市/电话）。</p>
    </header>

    <section class="controls">
      <div class="row">
        <label>
          省份
          <select id="province"></select>
        </label>
        <label>
          城市
          <select id="city"></select>
        </label>
      </div>
      <div class="row">
        <label class="grow">
          搜索
          <input id="q" type="search" placeholder="例如：广东 / 深圳 / 0755" autocomplete="off" />
        </label>
        <button id="reset" type="button">重置</button>
      </div>
      <div class="row small">
        <span id="count"></span>
      </div>
    </section>

    <section>
      <div id="results" class="results"></div>
    </section>

    <footer>
      <p class="foot">数据以表格为准；如有变更请联系管理员更新。</p>
    </footer>
  </div>

  <script src="./app.js"></script>
</body>
</html>
